{% extends "layout.html" %}
{% block content %}
<section class="card">
  <h2>Testbericht</h2>
  {% if not settings.groups %}
    <p>Bitte zuerst mindestens eine Gruppe anlegen.</p>
  {% else %}
    <form method="post" action="{{ ingress_path }}/report" class="stack">
      <label><span>Gruppe</span>
        <select name="group_id">
          {% for g in settings.groups %}
          <option value="{{ g.id }}" {% if g.id == selected_group_id %}selected{% endif %}>{{ g.name }}</option>
          {% endfor %}
        </select>
      </label>

      <label><span>Zeitraum</span>
        <select name="mode">
          <option value="auto" {% if selected_mode == "auto" %}selected{% endif %}>Automatisch nach Modus</option>
          <option value="manual" {% if selected_mode == "manual" %}selected{% endif %}>Manuell Monat</option>
        </select>
      </label>
      <div class="form-grid">
        <label><span>Jahr</span>
          <select name="year">{% for y in years %}<option value="{{ y }}" {% if selected_year == (y|string) %}selected{% endif %}>{{ y }}</option>{% endfor %}</select>
        </label>
        <label><span>Monat</span>
          <select name="month">{% for m in months %}{% set month_value = "%02d"|format(m) %}<option value="{{ month_value }}" {% if selected_month == month_value %}selected{% endif %}>{{ month_value }}</option>{% endfor %}</select>
        </label>
      </div>

      <div class="actions">
        <button type="submit" name="action" value="preview">Vorschau</button>
        <button type="submit" name="action" value="pdf">PDF erzeugen</button>
        <button type="submit" name="action" value="send">PDF erzeugen und senden</button>
      </div>
    </form>
  {% endif %}
  {% if generated_file %}
    <p class="muted">Erstellt: {{ generated_file }}</p>
  {% endif %}
</section>

{% if preview_html %}
<section class="card">
  <h2>HTML Vorschau</h2>
  <iframe style="width:100%; height:1000px; background:#fff; border:1px solid #ccc;" srcdoc='{{ preview_html|e }}'></iframe>
</section>
{% endif %}
{% endblock %}
