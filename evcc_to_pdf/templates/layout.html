<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or "EVCC to PDF" }}</title>
  <link rel="stylesheet" href="{{ ingress_path }}/static/style.css">
  <script>
    function toggleSection(selectId, value, targetId) {
      const el = document.getElementById(selectId);
      const target = document.getElementById(targetId);
      if (!el || !target) return;
      target.style.display = el.value === value ? 'block' : 'none';
    }
  </script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <h1>EVCC to PDF</h1>
      <nav class="nav">
        <a href="{{ ingress_path }}/">Dashboard</a>
        <a href="{{ ingress_path }}/settings">Einstellungen</a>
        <a href="{{ ingress_path }}/groups">Gruppen</a>
        <a href="{{ ingress_path }}/templates">HTML Templates</a>
        <a href="{{ ingress_path }}/report">Testbericht</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
