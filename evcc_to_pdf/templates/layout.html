<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or "EVCC to PDF" }}</title>
  <link rel="stylesheet" href="{{ ingress_path }}/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <h1>EVCC to PDF</h1>
      <nav class="nav">
        <a href="{{ ingress_path }}/">Dashboard</a>
        <a href="{{ ingress_path }}/settings">Einstellungen</a>
        <a href="{{ ingress_path }}/groups">Gruppen</a>
        <a href="{{ ingress_path }}/templates">Templates</a>
        <a href="{{ ingress_path }}/report">Testbericht</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <script>
    function toggleByValue(selectId, value, targetId) {
      const el = document.getElementById(selectId);
      const target = document.getElementById(targetId);
      if (!el || !target) return;
      target.style.display = el.value === value ? "grid" : "none";
    }
    document.addEventListener("DOMContentLoaded", function () {
      const senderMode = document.getElementById("sender_mode");
      const htmlMode = document.getElementById("html_mode");
      const senderFields = document.getElementById("custom_sender_fields");
      const htmlFields = document.getElementById("custom_html_fields");
      function refreshGroupVisibility() {
        if (senderMode && senderFields) {
          senderFields.style.display = senderMode.value === "custom" ? "grid" : "none";
        }
        if (htmlMode && htmlFields) {
          const showHtml = senderMode && senderMode.value === "custom" && htmlMode.value === "custom";
          htmlFields.style.display = showHtml ? "grid" : "none";
        }
      }
      if (senderMode) senderMode.addEventListener("change", refreshGroupVisibility);
      if (htmlMode) htmlMode.addEventListener("change", refreshGroupVisibility);
      refreshGroupVisibility();
    });
  </script>
</body>
</html>
