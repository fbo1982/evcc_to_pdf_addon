{% extends "layout.html" %}
{% block content %}
<form method="post" action="{{ ingress_path }}/settings" class="stack">
  <section class="card">
    <h2>EVCC</h2>
    <div class="form-grid">
      <label><span>EVCC URL</span><input type="text" name="evcc_url" value="{{ settings.evcc.url }}"></label>
      <label><span>EVCC Passwort</span><input type="password" name="evcc_password" value="{{ settings.evcc.password }}"></label>
    </div>
  </section>

  <section class="card">
    <h2>Absender</h2>
    <div class="form-grid">
      <label><span>Name</span><input type="text" name="sender_name" value="{{ settings.sender.name }}"></label>
      <label><span>E-Mail</span><input type="email" name="sender_email" value="{{ settings.sender.email }}"></label>
      <label><span>Straße</span><input type="text" name="sender_street" value="{{ settings.sender.street }}"></label>
      <label><span>PLZ</span><input type="text" name="sender_zip" value="{{ settings.sender.zip }}"></label>
      <label><span>Ort</span><input type="text" name="sender_city" value="{{ settings.sender.city }}"></label>
      <label><span>Netzstrompreis €/kWh</span><input type="text" name="grid_price" value="{{ settings.reporting.grid_price }}"></label>
    </div>
  </section>

  <section class="card">
    <h2>Bankverbindung</h2>
    <div class="form-grid">
      <label><span>Empfänger</span><input type="text" name="bank_recipient" value="{{ settings.bank.recipient }}"></label>
      <label><span>IBAN</span><input type="text" name="bank_iban" value="{{ settings.bank.iban }}"></label>
      <label><span>BIC</span><input type="text" name="bank_bic" value="{{ settings.bank.bic }}"></label>
      <label><span>Kreditinstitut</span><input type="text" name="bank_institute" value="{{ settings.bank.institute }}"></label>
    </div>
  </section>

  <section class="card">
    <h2>SMTP</h2>
    <div class="form-grid">
      <label><span>Host</span><input type="text" name="smtp_host" value="{{ settings.smtp.host }}"></label>
      <label><span>Port</span><input type="number" name="smtp_port" value="{{ settings.smtp.port }}"></label>
      <label><span>Benutzer</span><input type="text" name="smtp_user" value="{{ settings.smtp.user }}"></label>
      <label><span>Passwort</span><input type="password" name="smtp_password" value="{{ settings.smtp.password }}"></label>
      <label class="checkbox"><input type="checkbox" name="smtp_tls" {% if settings.smtp.tls %}checked{% endif %}><span>TLS verwenden</span></label>
    </div>
  </section>

  <section class="card">
    <h2>Standard</h2>
    <div class="form-grid">
      <label>
        <span>Abrechnungsmodus</span>
        <select name="default_billing_mode">
          {% for key, label in [("monthly","Monatlich"),("quarterly","Quartal"),("halfyearly","Halbjährlich"),("yearly","Jährlich")] %}
            <option value="{{ key }}" {% if settings.reporting.default_billing_mode == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <label><span>Standard E-Mail-Betreff</span><input type="text" name="default_email_subject" value="{{ settings.reporting.default_email_subject }}"></label>
    <label><span>Standard E-Mail-Inhalt</span><textarea name="default_email_body" rows="6">{{ settings.reporting.default_email_body }}</textarea></label>
    <p class="muted">Shortcuts für Betreff und Inhalt: {{period_label}}, {{period_start}}, {{period_end}}, {{period_month}}, {{period_year}}, {{billing_mode_label}}</p>
  </section>

  <section class="card">
    <h2>Scheduler</h2>
    <div class="form-grid">
      <label class="checkbox"><input type="checkbox" name="scheduler_enabled" {% if settings.scheduler.enabled %}checked{% endif %}><span>Scheduler aktivieren</span></label>
      <label><span>Tag im Monat</span><input type="number" min="1" max="28" name="scheduler_day_of_month" value="{{ settings.scheduler.day_of_month }}"></label>
      <label><span>Uhrzeit</span><input type="time" name="scheduler_time" value="{{ settings.scheduler.time }}"></label>
    </div>
  </section>

  <div class="actions"><button type="submit">Speichern</button></div>
</form>
{% endblock %}
