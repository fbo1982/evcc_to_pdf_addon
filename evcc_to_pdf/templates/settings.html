{% extends "layout.html" %}
{% block content %}
<form method="post" action="{{ ingress_path }}/settings" class="stack">
  <section class="card">
    <h2>MQTT (statisch aus Add-on-Konfiguration)</h2>
    <div class="form-grid">
      <label><span>Host</span><input type="text" value="{{ addon_opts.mqtt_host }}" readonly></label>
      <label><span>Port</span><input type="text" value="{{ addon_opts.mqtt_port }}" readonly></label>
      <label><span>User</span><input type="text" value="{{ addon_opts.mqtt_user }}" readonly></label>
      <label><span>Basispfad</span><input type="text" value="{{ addon_opts.mqtt_base_topic }}" readonly></label>
    </div>
    <p class="muted">Diese Felder kommen aus dem Add-on-Konfigurationsbereich und bleiben bei normalen Updates erhalten.</p>
  </section>

  <section class="card">
    <h2>EVCC</h2>
    <div class="form-grid">
      <label><span>EVCC URL</span><input type="text" name="evcc_url" value="{{ ui.evcc.url }}"></label>
      <label><span>EVCC Passwort</span><input type="password" name="evcc_password" value="{{ secrets.evcc_password }}"></label>
    </div>
  </section>

  <section class="card">
    <h2>Standard-Absender</h2>
    <div class="form-grid">
      <label><span>Name</span><input type="text" name="sender_name" value="{{ ui.sender.name }}"></label>
      <label><span>E-Mail</span><input type="email" name="sender_email" value="{{ ui.sender.email }}"></label>
      <label><span>Straße</span><input type="text" name="sender_street" value="{{ ui.sender.street }}"></label>
      <label><span>PLZ</span><input type="text" name="sender_zip" value="{{ ui.sender.zip }}"></label>
      <label><span>Ort</span><input type="text" name="sender_city" value="{{ ui.sender.city }}"></label>
      <label><span>Netzstrompreis €/kWh</span><input type="text" name="grid_price" value="{{ ui.reporting.grid_price }}"></label>
    </div>
  </section>

  <section class="card">
    <h2>Standard-Abrechnung</h2>
    <div class="form-grid">
      <label>
        <span>Abrechnungsmodus</span>
        <select name="billing_mode_default">
          <option value="monthly" {% if ui.reporting.billing_mode_default == 'monthly' %}selected{% endif %}>Monatlich</option>
          <option value="quarterly" {% if ui.reporting.billing_mode_default == 'quarterly' %}selected{% endif %}>Quartal</option>
          <option value="halfyearly" {% if ui.reporting.billing_mode_default == 'halfyearly' %}selected{% endif %}>Halbjährlich</option>
          <option value="yearly" {% if ui.reporting.billing_mode_default == 'yearly' %}selected{% endif %}>Jährlich</option>
        </select>
      </label>
      <label>
        <span>Standard-HTML-Template</span>
        <select name="default_template_id">
          {% for tpl in ui.templates.values() %}
            <option value="{{ tpl.id }}" {% if ui.reporting.default_template_id == tpl.id %}selected{% endif %}>{{ tpl.label }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <label>
      <span>Standard-E-Mail-Inhalt</span>
      <textarea name="default_email_body" rows="10">{{ ui.reporting.default_email_body }}</textarea>
    </label>
  </section>

  <section class="card">
    <h2>SMTP</h2>
    <div class="form-grid">
      <label><span>Host</span><input type="text" name="smtp_host" value="{{ ui.smtp.host }}"></label>
      <label><span>Port</span><input type="number" name="smtp_port" value="{{ ui.smtp.port }}"></label>
      <label><span>Benutzer</span><input type="text" name="smtp_user" value="{{ ui.smtp.user }}"></label>
      <label><span>Passwort</span><input type="password" name="smtp_password" value="{{ secrets.smtp_password }}"></label>
      <label class="checkbox"><input type="checkbox" name="smtp_tls" {% if ui.smtp.tls %}checked{% endif %}><span>TLS verwenden</span></label>
    </div>
  </section>

  <section class="card">
    <h2>Scheduler-Konfiguration</h2>
    <div class="form-grid">
      <label class="checkbox"><input type="checkbox" name="scheduler_enabled" {% if ui.scheduler.enabled %}checked{% endif %}><span>Scheduler aktivieren</span></label>
      <label><span>Tag im Monat</span><input type="number" min="1" max="28" name="scheduler_day_of_month" value="{{ ui.scheduler.day_of_month }}"></label>
      <label><span>Uhrzeit</span><input type="time" name="scheduler_time" value="{{ ui.scheduler.time }}"></label>
    </div>
  </section>

  <div class="actions"><button type="submit">Speichern</button></div>
</form>
{% endblock %}
